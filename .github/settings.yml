repository:
  name: BeBitter
  description: Portfolio profissional de Bernardo Gomes com React, TypeScript e foco em performance.
  homepage: https://bebitterbebetter.com.br
  default_branch: main
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: false
  has_discussions: false
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  allow_auto_merge: true
  delete_branch_on_merge: true
  topics:
    - frontend
    - performance
    - portfolio
    - react
    - typescript
    - vite

labels:
  - name: dependencies
    color: "0366d6"
    description: Pull requests that update a dependency file
  - name: npm
    color: "5319e7"
    description: Pull requests that update npm dependencies
  - name: github-actions
    color: "1d76db"
    description: Pull requests that update GitHub Actions workflows
